- title: "Enhanced Differential Equation Solvers Using Parallel Algorithms"
  slides: "https://drive.google.com/open?id=1Kgk_hyf2IharsyZ3MrSb3xou8fmBlM4m"
  abstract_url: "https://drive.google.com/open?id=1vDVbmkYslDomSF6u4W6GsDAIETGLScuw"
  venue: "UMass CS Theory Seminar"
  venue_url: "https://groups.cs.umass.edu/theory/"
  date: "Apr 29th, 2020"
  abstract: 
    - 'The purpose of this talk/survey is to introduce the concept of parallel computing systems and algorithms, and the efforts of developing more efficient (optimistically more accurate) methods of computing numerical solutions to differential equations.'
    - 'Started from the parallel implementation of the Runge-Kutta method as well as the other classical integrators, parallel computing is still attracting numerous researchers by improving the numerical solvers to unstable equations such as stiff equations and resource-intensive algorithms such as fractional-order differential equations. This talk will focus mainly on the numerical methods for stiff equation solvers and fractional order differential equation solvers.'

